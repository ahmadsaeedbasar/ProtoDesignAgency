name: Bug Report
description: Report a reproducible bug in the portfolio app.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Please include clear reproduction steps and expected behavior."
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Go to ...\n2. Click ...\n3. Observe ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Browser/OS, Node version"